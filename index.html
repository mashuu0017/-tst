<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>野球拳</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
width: 100%; height: 100%;
overflow: hidden;
background: #0a0a0a;
}

/* ===== 横画面強制メッセージ ===== */
#rotate-msg {
display: none;
position: fixed;
inset: 0;
background: #0a0a0a;
color: #fff;
font-size: 1.2rem;
align-items: center;
justify-content: center;
flex-direction: column;
gap: 1rem;
z-index: 9999;
font-family: “Hiragino Kaku Gothic ProN”, sans-serif;
text-align: center;
}
#rotate-msg .icon { font-size: 3rem; }

@media (orientation: portrait) {
#rotate-msg { display: flex; }
}

/* ===== メインアプリ（横画面のみ表示） ===== */
#app {
width: 100vw;
height: 100vh;
position: relative;
font-family: “Hiragino Kaku Gothic ProN”, “Noto Sans JP”, sans-serif;
}

@media (orientation: portrait) {
#app { display: none; }
}

/* ===== 画面共通 ===== */
.screen {
position: absolute;
inset: 0;
display: none;
}
.screen.active { display: flex; }

/* ===== タイトル画面 ===== */
#screen-title {
flex-direction: column;
align-items: center;
justify-content: flex-end;
padding-bottom: 6vh;
}

#title-bg {
position: absolute;
inset: 0;
width: 100%;
height: 100%;
object-fit: cover;
object-position: center top;
}

#btn-start {
position: relative;
z-index: 1;
padding: 0.9em 3.5em;
font-size: clamp(1rem, 2.5vw, 1.4rem);
font-family: “Hiragino Kaku Gothic ProN”, sans-serif;
letter-spacing: 0.4em;
background: rgba(10,10,10,0.75);
color: #f5d98a;
border: 2px solid #f5d98a;
cursor: pointer;
transition: background 0.2s, color 0.2s;
clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
#btn-start:hover {
background: #f5d98a;
color: #0a0a0a;
}

/* ===== ゲーム画面 ===== */
#screen-game {
background: #111;
flex-direction: row;
}

/* 左カラム：相手キャラ */
#col-enemy {
width: 42%;
height: 100%;
position: relative;
display: flex;
flex-direction: column;
align-items: center;
justify-content: flex-end;
background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
border-right: 1px solid #2a2a2a;
overflow: hidden;
}

/* 敵キャラ画像 */
#enemy-img-wrap {
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%);
width: 100%;
height: 100%;
display: flex;
align-items: flex-end;
justify-content: center;
}

#enemy-img {
max-height: 96%;
max-width: 100%;
object-fit: contain;
object-position: bottom center;
transition: opacity 0.4s ease;
filter: drop-shadow(0 0 20px rgba(77,184,168,0.25));
}

/* 脱衣エフェクト */
#strip-overlay {
position: absolute;
inset: 0;
background: rgba(255,255,255,0);
pointer-events: none;
transition: background 0.1s;
z-index: 5;
}
#strip-overlay.flash {
animation: stripFlash 0.5s ease forwards;
}
@keyframes stripFlash {
0%   { background: rgba(255,220,100,0.5); }
100% { background: rgba(255,255,255,0); }
}

/* 敵のハート（左上） */
#enemy-hearts-wrap {
position: absolute;
top: 10px;
left: 10px;
z-index: 10;
display: flex;
gap: 4px;
background: rgba(0,0,0,0.5);
padding: 5px 10px;
border-radius: 20px;
border: 1px solid #333;
}

/* 敵セリフ */
#enemy-speech-wrap {
position: absolute;
bottom: 12px;
left: 50%;
transform: translateX(-50%);
z-index: 10;
width: 90%;
background: rgba(0,0,0,0.7);
border: 1px solid #444;
border-radius: 8px;
padding: 6px 12px;
font-size: clamp(0.7rem, 1.4vw, 0.9rem);
color: #f0ece4;
text-align: center;
min-height: 2.2em;
display: flex;
align-items: center;
justify-content: center;
backdrop-filter: blur(4px);
}

/* 右カラム：ゲームコントロール */
#col-ctrl {
flex: 1;
height: 100%;
display: flex;
flex-direction: column;
align-items: center;
justify-content: space-between;
padding: 12px 16px;
background: #0f0f18;
gap: 8px;
}

/* プレイヤーハート（上部） */
#player-status {
width: 100%;
display: flex;
align-items: center;
justify-content: space-between;
}

#player-hearts-wrap {
display: flex;
gap: 3px;
background: rgba(0,0,0,0.4);
padding: 5px 10px;
border-radius: 20px;
border: 1px solid #333;
}

#round-label {
font-size: clamp(0.65rem, 1.2vw, 0.8rem);
color: rgba(77,184,168,0.8);
letter-spacing: 0.2em;
}

.heart {
font-size: clamp(0.9rem, 1.8vw, 1.1rem);
color: #e07070;
transition: all 0.3s;
}
.heart.lost { opacity: 0.15; filter: grayscale(1); transform: scale(0.8); }

/* 結果エリア */
#result-area {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 6px;
min-height: 0;
}

/* 手の表示 */
#hands-display {
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
opacity: 0;
transition: opacity 0.3s;
}
#hands-display.show { opacity: 1; }

.hand-img-show {
width: clamp(40px, 7vw, 70px);
height: clamp(40px, 7vw, 70px);
object-fit: contain;
}

.vs-text {
font-size: clamp(0.7rem, 1.3vw, 0.9rem);
color: #555;
}

/* 結果テキスト */
#result-text {
font-size: clamp(1.4rem, 3.5vw, 2.2rem);
font-weight: bold;
letter-spacing: 0.15em;
opacity: 0;
transform: scale(0.5);
transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
#result-text.show { opacity: 1; transform: scale(1); }
#result-text.win  { color: #4db8a8; text-shadow: 0 0 20px rgba(77,184,168,0.6); }
#result-text.lose { color: #e07070; text-shadow: 0 0 20px rgba(224,112,112,0.5); }
#result-text.draw { color: #888; }

/* じゃんけんボタン */
#janken-area {
width: 100%;
display: flex;
flex-direction: column;
align-items: center;
gap: 8px;
}

#janken-label {
font-size: clamp(0.6rem, 1.1vw, 0.75rem);
color: #555;
letter-spacing: 0.4em;
}

#hand-buttons {
display: flex;
gap: clamp(8px, 2vw, 20px);
}

.hand-btn {
width: clamp(60px, 11vw, 100px);
height: clamp(60px, 11vw, 100px);
background: rgba(255,255,255,0.03);
border: 1.5px solid #333;
border-radius: 50%;
cursor: pointer;
transition: all 0.2s;
padding: 6px;
display: flex;
align-items: center;
justify-content: center;
overflow: hidden;
}
.hand-btn img {
width: 100%;
height: 100%;
object-fit: contain;
}
.hand-btn:hover:not(:disabled) {
border-color: #4db8a8;
transform: scale(1.1) translateY(-3px);
box-shadow: 0 6px 20px rgba(77,184,168,0.3);
background: rgba(77,184,168,0.05);
}
.hand-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ===== プレイヤー負けモーダル ===== */
#modal-lose {
position: fixed;
inset: 0;
z-index: 100;
background: rgba(0,0,0,0.88);
display: none;
align-items: center;
justify-content: center;
animation: fadeIn 0.3s ease;
}
#modal-lose.active { display: flex; }

@keyframes fadeIn {
from { opacity: 0; }
to   { opacity: 1; }
}

.modal-inner {
display: flex;
flex-direction: row;
align-items: center;
gap: 24px;
max-width: 90vw;
max-height: 90vh;
}

#player-img-box {
height: 80vh;
max-height: 80vh;
aspect-ratio: auto;
display: flex;
align-items: center;
justify-content: center;
}

#player-img {
max-height: 80vh;
max-width: 50vw;
object-fit: contain;
border-radius: 8px;
display: block;
}

.modal-right {
display: flex;
flex-direction: column;
gap: 16px;
max-width: 260px;
}

#modal-serif {
font-size: clamp(0.85rem, 1.6vw, 1rem);
color: #f0ece4;
line-height: 1.8;
padding: 12px 16px;
background: rgba(255,255,255,0.04);
border-left: 2px solid #4db8a8;
border-radius: 4px;
}

#btn-continue {
padding: 0.7em 2em;
background: transparent;
border: 1.5px solid #555;
color: #aaa;
font-family: inherit;
font-size: clamp(0.8rem, 1.4vw, 0.95rem);
letter-spacing: 0.3em;
cursor: pointer;
transition: all 0.2s;
border-radius: 4px;
}
#btn-continue:hover { border-color: #4db8a8; color: #4db8a8; }

/* ===== エンディング画面 ===== */
#screen-ending {
flex-direction: row;
align-items: center;
justify-content: center;
gap: 32px;
background: #0a0a0a;
padding: 20px;
}

#ending-img-box {
height: 85vh;
display: flex;
align-items: center;
}

#ending-img {
max-height: 85vh;
max-width: 50vw;
object-fit: contain;
border-radius: 8px;
display: block;
}

.ending-right {
display: flex;
flex-direction: column;
gap: 16px;
max-width: 340px;
flex-shrink: 0;
}

#ending-title {
font-size: clamp(1.2rem, 2.8vw, 2rem);
letter-spacing: 0.25em;
font-weight: bold;
}
#ending-title.player-win  { color: #4db8a8; text-shadow: 0 0 20px rgba(77,184,168,0.5); }
#ending-title.player-lose { color: #e07070; text-shadow: 0 0 20px rgba(224,112,112,0.4); }

#ending-dialogue {
display: flex;
flex-direction: column;
gap: 10px;
max-height: 50vh;
overflow-y: auto;
padding-right: 4px;
}
#ending-dialogue::-webkit-scrollbar { width: 3px; }
#ending-dialogue::-webkit-scrollbar-thumb { background: #333; }

.dlg-line {
font-size: clamp(0.8rem, 1.5vw, 0.95rem);
line-height: 1.7;
color: #ccc;
opacity: 0;
transform: translateY(6px);
transition: all 0.4s ease;
}
.dlg-line.show { opacity: 1; transform: translateY(0); }
.dlg-line .dlg-speaker { color: #4db8a8; margin-right: 0.4em; }
.dlg-line.me .dlg-speaker { color: #c8a0a0; }

#btn-retry {
padding: 0.8em 2.5em;
background: transparent;
border: 2px solid #4db8a8;
color: #4db8a8;
font-family: inherit;
font-size: clamp(0.85rem, 1.5vw, 1rem);
letter-spacing: 0.3em;
cursor: pointer;
transition: all 0.25s;
border-radius: 4px;
opacity: 0;
animation: fadeIn 0.5s ease 2.5s forwards;
}
#btn-retry:hover { background: rgba(77,184,168,0.1); box-shadow: 0 0 15px rgba(77,184,168,0.3); }

/* シェイク */
@keyframes shake {
0%,100% { transform: translateX(0); }
20% { transform: translateX(-8px); }
40% { transform: translateX(8px); }
60% { transform: translateX(-5px); }
80% { transform: translateX(5px); }
}
.shake { animation: shake 0.45s ease; }
</style>

</head>

<script>
// ===== 設定 =====
const PLAYER_MAX_LOSES = 6;
const ENEMY_MAX_LOSES  = 5;

// 手の画像
const HAND_IMGS = {
  gu:    "ク_ー.PNG",
  choki: "チョキ.PNG",
  pa:    "ハ_ー.PNG",
};
const HAND_KEYS = ["gu","choki","pa"];

// 相手キャラ画像（段階別）
const ENEMY_IMGS = [
  "enemy_0.WEBP",
  "enemy_1.WEBP",
  "enemy_2.JPG",
  "enemy_3.WEBP",
  "enemy_4.jpg",
  "enemy_5.WEBP",
];

// プレイヤー負け画像
const PLAYER_LOSE_IMGS = [
  "player_lose_1.JPG",
  "player_lose_2.WEBP",
  "player_lose_3.WEBP",
  "player_lose_4.JPG",
  "player_lose_5.WEBP",
  "player_lose_6.WEBP",
];

// セリフ
const DIALOGUES = {
  win:  ["「……っ、む。」","なんで負けたの、俺。","偶然だから。次は負けない。","……見るな。","もう、笑わないでよ……"],
  lose: ["「へぇ。そうなんだ。」","……どうぞ？","別に、動揺してないし。","まあ、そうなるよね。","……続けるの？","……これで終わり？"],
  draw: ["「あいこか。」","もう一回。","……ふーん。","奇遇だね。","どっちも引かないの？","……ずっとこのまま？"],
};

const PLAYER_LOSE_SERIF = [
  "「……ふぅん。いいんじゃない。」",
  "「見てないから。……少しだけ見てるけど。」",
  "「なんか、似合ってるじゃん。」",
  "「……止めてほしいなら言えばいい。言わないけど。」",
  "「……全部、俺のせい？」",
  "「……もう、終わりだよ。」",
];

const ENDING_DIALOGUE = {
  win: [
    { me: false, speaker:"？？？", line:"「……わかってる。」" },
    { me: false, speaker:"？？？", line:"「……満足した？」" },
    { me: true,  speaker:"あなた", line:"「うん。」" },
    { me: false, speaker:"？？？", line:"「……次は負けない。」" },
  ],
  lose: [
    { me: false, speaker:"？？？", line:"「……終わったね。」" },
    { me: true,  speaker:"あなた", line:"「……うん。」" },
    { me: false, speaker:"？？？", line:"「次は、ちゃんとやれば？」" },
    { me: true,  speaker:"あなた", line:"「……またやるの？」" },
    { me: false, speaker:"？？？", line:"「……どうしようかな。」" },
  ],
};

// ===== 勝敗判定 =====
function judge(p, e) {
  if (p === e) return "draw";
  if ((p==="gu"&&e==="choki")||(p==="choki"&&e==="pa")||(p==="pa"&&e==="gu")) return "win";
  return "lose";
}

// ===== 状態 =====
let state = { playerLoses:0, enemyLoses:0, round:1, busy:false };

// ===== DOM =====
const $  = id => document.getElementById(id);
const enemyImg     = $("enemy-img");
const enemySpeech  = $("enemy-speech");
const resultText   = $("result-text");
const handsDisplay = $("hands-display");
const playerHands  = $("player-hearts-wrap");
const enemyHands   = $("enemy-hearts-wrap");
const roundLabel   = $("round-label");

// ===== 画面切り替え =====
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
}

// ===== ゲーム開始 =====
function startGame() {
  state = { playerLoses:0, enemyLoses:0, round:1, busy:false };
  updateHearts();
  updateEnemyImg();
  updateRound();
  enemySpeech.textContent = "「……何？　やる気なの？」";
  clearResult();
  enableButtons(true);
  showScreen("screen-game");
}

// ===== ハート更新 =====
function updateHearts() {
  playerHands.innerHTML = "";
  enemyHands.innerHTML  = "";
  for (let i = 0; i < PLAYER_MAX_LOSES; i++) {
    const s = document.createElement("span");
    s.className = "heart" + (i < state.playerLoses ? " lost" : "");
    s.textContent = "♥";
    playerHands.appendChild(s);
  }
  for (let i = 0; i < ENEMY_MAX_LOSES; i++) {
    const s = document.createElement("span");
    s.className = "heart" + (i < state.enemyLoses ? " lost" : "");
    s.textContent = "♥";
    enemyHands.appendChild(s);
  }
}

// ===== 敵画像更新 =====
function updateEnemyImg() {
  const lv = Math.min(state.enemyLoses, ENEMY_IMGS.length - 1);
  enemyImg.style.opacity = "0";
  setTimeout(() => {
    enemyImg.src = ENEMY_IMGS[lv];
    enemyImg.style.opacity = "1";
  }, 200);
}

function updateRound() {
  roundLabel.textContent = "ROUND " + state.round;
}

function clearResult() {
  resultText.className = "result-text";
  resultText.textContent = "";
  handsDisplay.className = "hands-display";
  $("player-hand-show").src = "";
  $("enemy-hand-show").src  = "";
}

function enableButtons(flag) {
  ["btn-gu","btn-choki","btn-pa"].forEach(id => $(id).disabled = !flag);
  state.busy = !flag;
}

// ===== じゃんけん =====
function play(playerKey) {
  if (state.busy) return;
  enableButtons(false);

  const enemyKey = HAND_KEYS[Math.floor(Math.random() * 3)];
  const result   = judge(playerKey, enemyKey);

  // 手を表示
  $("player-hand-show").src = HAND_IMGS[playerKey];
  $("enemy-hand-show").src  = HAND_IMGS[enemyKey];
  handsDisplay.className = "hands-display show";

  setTimeout(() => {
    // 結果テキスト
    if (result === "win") {
      resultText.textContent = "勝 ち！";
      resultText.className = "result-text show win";
    } else if (result === "lose") {
      resultText.textContent = "負 け…";
      resultText.className = "result-text show lose";
    } else {
      resultText.textContent = "あいこ";
      resultText.className = "result-text show draw";
    }

    // セリフ
    const pool = DIALOGUES[result];
    const idx  = Math.min(state.playerLoses + state.enemyLoses, pool.length - 1);
    enemySpeech.textContent = "「" + pool[idx].replace(/「|」/g,"") + "」";

    setTimeout(() => {
      if (result === "win")       handleEnemyLose();
      else if (result === "lose") handlePlayerLose();
      else {
        state.round++;
        updateRound();
        enableButtons(true);
      }
    }, 900);
  }, 400);
}

// ===== 相手が負けた =====
function handleEnemyLose() {
  state.enemyLoses++;
  updateHearts();

  // フラッシュ
  const ov = $("strip-overlay");
  ov.classList.add("flash");
  setTimeout(() => ov.classList.remove("flash"), 550);

  setTimeout(() => {
    updateEnemyImg();
    if (state.enemyLoses >= ENEMY_MAX_LOSES) {
      setTimeout(() => showEnding("win"), 700);
    } else {
      state.round++;
      updateRound();
      enableButtons(true);
    }
  }, 550);
}

// ===== プレイヤーが負けた =====
function handlePlayerLose() {
  state.playerLoses++;
  updateHearts();

  // シェイク
  const colE = $("col-enemy");
  colE.classList.add("shake");
  setTimeout(() => colE.classList.remove("shake"), 460);

  setTimeout(() => showLoseModal(), 450);
}

// ===== 負けモーダル =====
function showLoseModal() {
  const lv  = state.playerLoses;
  const src = PLAYER_LOSE_IMGS[lv - 1];
  const img = $("player-img");
  img.src = src;
  $("modal-serif").textContent = PLAYER_LOSE_SERIF[lv - 1] || "「……」";
  $("modal-lose").classList.add("active");
}

function closeModal() {
  $("modal-lose").classList.remove("active");
  if (state.playerLoses >= PLAYER_MAX_LOSES) {
    setTimeout(() => showEnding("lose"), 300);
  } else {
    state.round++;
    updateRound();
    enableButtons(true);
  }
}

// ===== エンディング =====
function showEnding(type) {
  showScreen("screen-ending");

  const title = $("ending-title");
  if (type === "win") {
    title.textContent = "— あ な た の 勝 ち —";
    title.className = "player-win";
    $("ending-img").src = "enemy_ending.WEBP";
  } else {
    title.textContent = "— あ な た の 負 け —";
    title.className = "player-lose";
    $("ending-img").src = "player_ending.WEBP";
  }

  const log   = $("ending-dialogue");
  log.innerHTML = "";
  const lines = ENDING_DIALOGUE[type];
  lines.forEach((d, i) => {
    const div = document.createElement("div");
    div.className = "dlg-line" + (d.me ? " me" : "");
    div.innerHTML = `<span class="dlg-speaker">${d.speaker}</span>${d.line}`;
    log.appendChild(div);
    setTimeout(() => {
      div.classList.add("show");
      log.scrollTop = log.scrollHeight;
    }, 500 + i * 650);
  });
}

// ===== リセット =====
function resetGame() {
  showScreen("screen-title");
}

// ===== 起動 =====
showScreen("screen-title");
</script>
