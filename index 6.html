body {
  margin: 0;
  background: #111;
  color: #fff;

}

/* 全体中央寄せ */
#app {
  max-width: 480px;
  margin: 0 auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #222;
}

/* チャットエリア */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
}

/* 吹き出し共通 */
.message {
  max-width: 75%;
  padding: 12px 14px;
  margin: 6px 0;
  border-radius: 16px;
  font-size: 17px;
  line-height: 1.4;
  word-break: break-word;
}

/* 自分 */
.me {
  align-self: flex-end;
  background: #0b93f6;
  border-bottom-right-radius: 4px;
}

/* 相手 */
.other {
  align-self: flex-start;
  background: #444;
  border-bottom-left-radius: 4px;
}

/* 選択肢エリア */
#choices {
  padding: 10px;
  border-top: 1px solid #333;
  background: #111;
}

.choice {
  display: block;
  width: 100%;
  padding: 14px;
  margin: 6px 0;
  font-size: 17px;
  background: #333;
  color: #fff;
  border: none;
  border-radius: 10px;
}
.choice:active {
  background: #555;
}

.system {
  align-self: center;
  background: transparent;
  color: #aaa;
  font-size: 17px;
  margin: 10px 0;
}

</style>
</head>

let current = "start";

function renderMessage(msg){
  const div = document.createElement("div");

  // 画像
  if(msg.image){
    const img = document.createElement("img");
    img.src = msg.image;
    img.style.maxWidth = "70%";
    img.style.borderRadius = "10px";
    img.style.margin = "8px 0";

    div.appendChild(img);

    div.style.alignSelf = (msg.speaker === "me") ? "flex-end" : "flex-start";
  }

  // システム
  else if(msg.system){
    div.className = "message system";
    div.textContent = msg.text;
  }

  // 通常メッセージ
  else {
    div.className = "message " + (msg.speaker === "me" ? "me" : "other");
    div.textContent = msg.text;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function playMessages(messages){
  for(const item of messages){
    if(item.delay){
      await new Promise(r => setTimeout(r, item.delay));
    } else {
      renderMessage(item);
    }
  }
}

function showChoices(choices){
  choicesEl.innerHTML = "";
  choices.forEach(c=>{
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = c.label;
    btn.onclick = ()=> loadScene(c.next);
    choicesEl.appendChild(btn);
  });
}

async function loadScene(key){
  current = key;
  const scene = scenario[key];

  if(!scene) return;

  await playMessages(scene.messages);
  showChoices(scene.choices || []);
}

loadScene("start");
</script>
